<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Security+ Master</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Security+ Master</h1>
        <p>Smart Flashcards • Leitner • Practice Exams</p>
      </div>
      <button id="resetBtn" class="ghost">Reset Progress</button>
    </header>

    <section class="stats" id="stats"></section>

    <main class="card" id="card">
      <div class="meta">
        <span id="counter">Question 1</span>
        <span id="domain">Domain 4.0 – Security Operations</span>
      </div>

      <section class="block">
        <h2>English Question</h2>
        <p id="questionEn"></p>
        <button class="speaker" data-read="questionEn">🔊 Listen</button>
      </section>

      <section class="block rtl hidden" id="faQuestionBlock">
        <h2>سؤال فارسی</h2>
        <p id="questionFa"></p>
        <button class="speaker" data-read="questionFa" data-lang="fa-IR">🔊 پخش فارسی</button>
      </section>
      <button id="toggleFaQuestion" class="secondary">Show Persian Translation</button>

      <section class="choices" id="choices"></section>

      <button id="toggleFaChoices" class="secondary">Show Persian Choices</button>
      <button id="showAnswer" class="primary">Show Answer & Explanation</button>

      <section class="answer hidden" id="answerBlock">
        <h2>Correct Answer</h2>
        <p id="correctAnswer"></p>

        <h2>Overall Explanation</h2>
        <p id="explanationEn"></p>
        <button class="speaker" data-read="explanationEn">🔊 Listen</button>

        <div class="rtl persian-box">
          <h2>توضیح فارسی</h2>
          <p id="explanationFa"></p>
          <button class="speaker" data-read="explanationFa" data-lang="fa-IR">🔊 پخش فارسی</button>
        </div>

        <div class="leitner-actions">
          <button id="wrongBtn" class="danger">Need Review / غلط زدم</button>
          <button id="rightBtn" class="success">I Know It / درست زدم</button>
        </div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
