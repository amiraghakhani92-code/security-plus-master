<!doctype html><html><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Security+ Master v0.2</title>
<link rel='stylesheet' href='style.css'></head>
<body>
<div class='container'>
<header><h1>🛡️ Security+ Master</h1><div class='progress'><div id='bar'></div></div><p>Question <span id='qnum'>1</span> / 90</p></header>
<div class='card'>
<h2 id='question'>Sample Question Placeholder</h2>
<button class='opt'>Option A</button>
<button class='opt'>Option B</button>
<button class='opt'>Option C</button>
<button class='opt'>Option D</button>
<div class='actions'>
<button id='prev'>Previous</button>
<button id='submit'>Submit</button>
<button id='next'>Next</button>
</div>
</div>
<section class='dash'>
<div class='tile'>Accuracy<br><b>0%</b></div>
<div class='tile'>Correct<br><b>0</b></div>
<div class='tile'>Wrong<br><b>0</b></div>
<div class='tile'>Leitner<br><b>Box 1</b></div>
</section>
</div>
<script src='app.js'></script>
</body></html>
